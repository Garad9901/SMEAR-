global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: routeiq-x-production
    region: ap-south-1

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── RouteIQ X Services ────────────────────────────────────────
  - job_name: "routeiq-api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "routeiq-ai-engine"
    static_configs:
      - targets: ["ai-engine:8002"]
    scrape_interval: 15s

  - job_name: "routeiq-geospatial"
    static_configs:
      - targets: ["geospatial-engine:8001"]

  - job_name: "routeiq-agents"
    static_configs:
      - targets: ["agents:8003"]

  - job_name: "routeiq-optimizer"
    static_configs:
      - targets: ["optimizer:8004"]

  # ── Infrastructure ────────────────────────────────────────────
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "celery-flower"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics

  # ── Kubernetes ────────────────────────────────────────────────
  - job_name: "kubernetes-nodes"
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
